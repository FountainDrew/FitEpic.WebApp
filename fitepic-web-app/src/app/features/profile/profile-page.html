<h1 class="page-title">Profile</h1>

@if (loading()) {
  <mat-card aria-hidden="true">
    <mat-card-header>
      <mat-card-title>
        <span class="skeleton skeleton-card-title"></span>
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="profile-form">
        <span class="skeleton skeleton-field"></span>
        <span class="skeleton skeleton-field"></span>
      </div>
    </mat-card-content>
  </mat-card>
} @else {
  @if (reason() === 'timezone-required') {
    <mat-card class="reason-card">
      <mat-card-content>
        Set your timezone so we can show your weekly stats on the right calendar week.
      </mat-card-content>
    </mat-card>
  }

  <mat-card>
    <mat-card-header>
      <mat-card-title>Athlete profile</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form class="profile-form" (ngSubmit)="save()">
        <mat-form-field appearance="outline">
          <mat-label>Display name</mat-label>
          <input
            matInput
            name="displayName"
            [ngModel]="displayName()"
            (ngModelChange)="displayName.set($event)"
            maxlength="100"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Timezone</mat-label>
          <mat-select
            name="timezone"
            [ngModel]="timezone()"
            (ngModelChange)="timezone.set($event)"
            required
          >
            @for (tz of timezones; track tz) {
              <mat-option [value]="tz">{{ tz }}</mat-option>
            }
          </mat-select>
          <mat-hint>
            <button mat-button type="button" (click)="detectBrowserTimezone()">
              Use browser timezone
            </button>
          </mat-hint>
        </mat-form-field>

        <div class="actions">
          <button
            mat-flat-button
            color="primary"
            type="submit"
            [disabled]="saving() || !displayName().trim() || !timezone()"
          >
            {{ saving() ? 'Saving…' : 'Save' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
}
